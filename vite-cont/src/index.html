<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDS Scatterplots</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
  </head>
  <body>
    <aside id="app-sidebar" class="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <div class="sidebar-header-copy">
          <h2>Dataset Menu</h2>
        </div>
        <button class="sidebar-close" type="button" aria-label="Close menu">×</button>
      </div>

      <nav class="sidebar-nav" id="nav">
        <div class="sidebar-section">
          <h3>Datasets</h3>
          <ul id="datasets-list"></ul>
        </div>

        <div class="sidebar-section">
          <h3>Attributes</h3>
          <ul id="attributes-list"></ul>
        </div>
      </nav>
    </aside>

    <div class="sidebar-backdrop" aria-hidden="true"></div>

    <main class="page-shell">
      <div class="top-bar">
        <div class="top-bar-left">
          <button
            class="sidebar-toggle"
            id="menu-button"
            type="button"
            aria-controls="app-sidebar"
            aria-expanded="false"
          >
            <span class="sidebar-toggle-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span>Menu</span>
          </button>
        </div>
        <div class="top-bar-content" aria-hidden="true"></div>
      </div>

      <div class="page-content">
        <section class="top-row" aria-label="MDS plots and weights">
          <article class="panel-card plot-card">
            <div class="panel-header plot-title-row">
              <h2>Classical MDS</h2>
              <div class="plot-controls">
                <button
                  id="toggle-legend-classic"
                  type="button"
                  class="plot-control-btn"
                  aria-pressed="false"
                  aria-label="Toggle classes legend"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M5 6.5A1.5 1.5 0 1 1 8 6.5a1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2zM5 12a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2zM5 17.5A1.5 1.5 0 1 1 8 17.5a1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2z"
                    />
                  </svg>
                </button>
                <button
                  id="toggle-centroids-classic"
                  type="button"
                  class="plot-control-btn centroid-toggle"
                  aria-pressed="true"
                  aria-label="Toggle centroids"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M12 5c-5.5 0-9.5 5-9.5 7s4 7 9.5 7 9.5-5 9.5-7-4-7-9.5-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div id="mds-classic-container" class="plot-container"></div>
          </article>

          <article class="panel-card plot-card">
            <div class="panel-header plot-title-row">
              <h2>
                Non-Proportional MDS
                <span id="nonprop-timestep" class="plot-timestep"></span>
              </h2>
              <div class="plot-controls">
                <button
                  id="toggle-legend-nonprop"
                  type="button"
                  class="plot-control-btn"
                  aria-pressed="false"
                  aria-label="Toggle classes legend"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M5 6.5A1.5 1.5 0 1 1 8 6.5a1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2zM5 12a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2zM5 17.5A1.5 1.5 0 1 1 8 17.5a1.5 1.5 0 0 1-3 0zm5.5-1h8a1 1 0 1 1 0 2h-8a1 1 0 1 1 0-2z"
                    />
                  </svg>
                </button>
                <button
                  id="toggle-centroids-nonprop"
                  type="button"
                  class="plot-control-btn centroid-toggle"
                  aria-pressed="true"
                  aria-label="Toggle centroids"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M12 5c-5.5 0-9.5 5-9.5 7s4 7 9.5 7 9.5-5 9.5-7-4-7-9.5-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div id="mds-non-proportional-container" class="plot-container"></div>
          </article>

          <article class="panel-card weights-card">
            <div class="panel-header">
              <h2 class="weights-header">Weights Control Panel</h2>
            </div>

            <aside id="weights-panel" class="weights-panel">
              <div class="weights-actions">
                <button id="run-nonprop-btn" type="button" class="run-mds-btn">Run MDS</button>
                <button
                  id="reset-weights-btn"
                  type="button"
                  class="reset-weights-btn"
                  aria-label="Reset weights"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M4 12a8 8 0 0 1 13.66-5.66L20 4v6h-6l2.47-2.47A6 6 0 1 0 18 12h2a8 8 0 0 1-16 0z"
                    />
                  </svg>
                </button>
              </div>

              <p id="nonprop-status" class="weights-status"></p>
              <div id="weights-list" class="weights-list"></div>
            </aside>
          </article>
        </section>

        <section class="bottom-row" aria-label="Rateo chart and star graphs">
          <div class="rateo-panel panel-card">
            <div class="rateo-scroll">
              <button
                id="delete-config-btn"
                class="delete-config-btn"
                type="button"
                aria-label="Delete selected configuration"
              >
                🗑
              </button>
              <div id="rateo-chart" class="rateo-chart" aria-live="polite"></div>
            </div>
          </div>

          <div class="star-block">
            <div class="star-card star-card-left">
              <button
                class="sync-btn"
                type="button"
                data-target="star-graph-1"
                aria-label="Sync MDS from this configuration"
              >
                Sync
              </button>
              <div id="star-graph-1" class="star-canvas" aria-live="polite"></div>
            </div>
          </div>

          <div class="star-block">
            <div class="star-card star-card-right">
              <button
                class="sync-btn"
                type="button"
                data-target="star-graph-2"
                aria-label="Sync MDS from this configuration"
              >
                Sync
              </button>
              <div id="star-graph-2" class="star-canvas" aria-live="polite"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/sidebar.js"></script>
  </body>
</html>
