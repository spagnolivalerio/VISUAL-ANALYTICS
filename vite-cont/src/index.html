<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDS Scatterplots</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        color: #1b2430;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .page-header {
        margin-bottom: 20px;
      }

      .page-header p {
        margin-top: 8px;
        color: #425466;
      }

      .plots-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 16px;
      }

      .plot-card {
        background: #ffffff;
        border: 1px solid #d6dde6;
        border-radius: 10px;
        padding: 14px;
      }

      .plot-card h2 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .plot-container {
        border: 1px solid #d6dde6;
        border-radius: 8px;
        background: #fbfcfe;
        height: 420px;
        width: 100%;
      }

      .weights-panel {
        border: 1px solid #d6dde6;
        border-radius: 8px;
        background: #fbfcfe;
        margin-top: 12px;
        height: 260px;
        overflow-y: auto;
        padding: 10px;
      }

      .weights-header {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .weights-actions {
        margin-bottom: 10px;
      }

      .weights-actions button {
        width: 100%;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #1f6feb;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
      }

      .weights-actions button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .weights-status {
        margin-top: 8px;
        font-size: 12px;
        color: #425466;
        min-height: 16px;
      }

      .weight-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .weight-row label {
        font-size: 13px;
        color: #2f3a46;
      }

      .weight-row input[type="range"] {
        grid-column: 1 / span 2;
        width: 100%;
      }

      .weight-slider {
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 999px;
        background: #1f6feb;
        outline: none;
      }

      .weight-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #1f6feb;
        border: 2px solid #ffffff;
        box-shadow: 0 0 0 1px #1f6feb;
        cursor: pointer;
      }

      .weight-slider::-moz-range-track {
        height: 4px;
        border-radius: 999px;
        background: #1f6feb;
      }

      .weight-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #ffffff;
        background: #1f6feb;
        box-shadow: 0 0 0 1px #1f6feb;
        cursor: pointer;
      }

      .weight-value {
        font-size: 12px;
        color: #1b2430;
        min-width: 32px;
        text-align: right;
      }

      @media (max-width: 980px) {
        .weights-panel {
          height: 240px;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>Wine MDS Visualization</h1>
      <p>Page skeleton for two scatterplots: classical Euclidean MDS and non-proportional Euclidean MDS.</p>
    </header>

    <section class="plots-grid">
      <article class="plot-card">
        <h2>MDS Classico (Distanza Euclidea)</h2>
        <div id="mds-classic-container" class="plot-container"></div>
      </article>

      <article class="plot-card">
        <h2>MDS Non Proporzionale (Distanza Euclidea)</h2>
        <div id="mds-non-proportional-container" class="plot-container"></div>
        <aside id="weights-panel" class="weights-panel">
          <p class="weights-header">Pesi attributi</p>
          <div class="weights-actions">
            <button id="run-nonprop-btn" type="button">Calcola MDS non proporzionale</button>
            <p id="nonprop-status" class="weights-status"></p>
          </div>
          <div id="weights-list"></div>
        </aside>
      </article>
    </section>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
